<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhisperWood</title>
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <div id="loading-content">
            <h1>WhisperWood</h1>
            <p id="loading-text">Loading assets...</p>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <button id="skip-loading-btn" class="hidden">Skip...</button>
        </div>
    </div>

    <div id="ui-container">
        <div id="auth-screen">
            <h1>WhisperWood</h1>
            <div id="auth-error" class="auth-error hidden"></div>
            <input type="text" id="auth-username" placeholder="Username..." maxlength="15">
            <input type="password" id="auth-password" placeholder="Password..." maxlength="30">
            <div class="auth-buttons">
                <button id="login-btn">Log in</button>
                <button id="register-btn">Register</button>
            </div>
        </div>

        <div id="pause-menu" class="hidden">
            <button id="resume-btn">Continue</button>
            <button id="shop-btn">Shop</button>
            <button id="settings-btn">Settings</button>
            <button id="author-btn">Author</button>
        </div>

        <div id="shop-modal" class="hidden">
            <h2>Shop</h2>
            <div class="shop-item">
                <span>+Size (Lvl <span id="size-level">1</span>)</span>
                <button id="buy-size-btn">Buy for <span id="size-price">10</span> Ticks</button>
            </div>
            <div class="shop-item">
                <span>+Speed (Lvl <span id="speed-level">1</span>)</span>
                <button id="buy-speed-btn">Buy for <span id="speed-price">10</span> Ticks</button>
            </div>
            <button id="close-shop-btn">Back</button>
        </div>

        <div id="settings-modal" class="hidden">
            <h2>Settings</h2>
            <div class="setting-item">
                <label>Sounds:</label>
                <button id="toggle-sound-btn">On</button>
            </div>
            <div class="setting-item">
                <label>Chat:</label>
                <button id="toggle-chat-btn">Show</button>
            </div>
            <div class="setting-item">
                <label>Сессия:</label>
                <button id="reset-session-btn">Char reset</button>
            </div>
            <button id="close-settings-btn">Back</button>
        </div>

        <div id="chat-container" class="hidden">
            <input type="text" id="chat-input" placeholder="whisper..." maxlength="50">
        </div>
        
        <!-- Player counter -->
        <div id="player-counter" class="hidden">
            <span id="player-count">0</span> Players
        </div>

        <!-- Ticks panel -->
        <div id="ticks-panel" class="hidden">
            <span id="ticks-count">0</span> Ticks
        </div>
    </div>

    <!-- Mobile contol -->
    <div id="mobile-controls" class="hidden">
        <div id="joystick-container">
            <div id="joystick-base">
                <div id="joystick-handle"></div>
            </div>
        </div>
        
        <!-- Touch area (left part of screen) -->
        <div id="touch-camera-area"></div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="./src/js/main.js"></script>
</body>
</html>
